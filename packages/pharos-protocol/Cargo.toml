[package]
name = "pharos-protocol"
version = "0.1.0"
edition = "2021"
authors = ["Richard D. <https://github.com/iamrichardd>"]
license = "FSL-1.1"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
thiserror = "1.0"
chrono = { version = "0.4", features = ["serde"] }
anyhow = "1.0"

[dev-dependencies]
serde_json = "1.0"
