<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PKD 2026 Design Matrix - Project Prism</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* ========================================================================
         * 1. HIGH-PERFORMANCE / PLAYFUL OPTIMISM
         * ======================================================================== */
        :root, body.theme-perf-dark {
            --bg-canvas: #121212; --bg-surface: #1a1a1a; --accent: #2dffc4;
            --text-main: #e2e8f0; --text-muted: #84a59d; --border: rgba(132, 165, 157, 0.1);
        }
        body.theme-perf-light {
            --bg-canvas: #F0EEE9; --bg-surface: #ffffff; --accent: #990F3D;
            --text-main: #1a1a1a; --text-muted: #708090; --border: rgba(112, 128, 144, 0.15);
        }

        /* ========================================================================
         * 2. BALANCED & CALM / MUTED EARTH BOTANICALS
         * ======================================================================== */
        body.theme-bal-dark {
            --bg-canvas: #1b201e; --bg-surface: #242b28; --accent: #e07a5f;
            --text-main: #f4f1de; --text-muted: #84a59d; --border: rgba(224, 122, 95, 0.1);
        }
        body.theme-bal-light {
            --bg-canvas: #F0EEE9; --bg-surface: #ffffff; --accent: #E2725B;
            --text-main: #1b201e; --text-muted: #9DC183; --border: rgba(157, 193, 131, 0.15);
        }

        /* ========================================================================
         * 3. SOPHISTICATED MOODY / WARM NEUTRAL LUXE
         * ======================================================================== */
        body.theme-moody-dark {
            --bg-canvas: #0d1b1e; --bg-surface: #152a2d; --accent: #d4a5a5;
            --text-main: #f8fafc; --text-muted: #6b8e8e; --border: rgba(212, 165, 165, 0.1);
        }
        body.theme-moody-light {
            --bg-canvas: #F0EEE9; --bg-surface: #ffffff; --accent: #4A0404;
            --text-main: #152a2d; --text-muted: #7A5C4A; --border: rgba(122, 92, 74, 0.15);
        }

        /* ========================================================================
         * 4. QUIET LUXURY / SOLAR VIOLET
         * ======================================================================== */
        body.theme-solar-dark {
            --bg-canvas: #1a1a2e; --bg-surface: #24243e; --accent: #706fd3;
            --text-main: #f7f1e3; --text-muted: #a5a5d9; --border: rgba(112, 111, 211, 0.1);
        }
        body.theme-solar-light {
            --bg-canvas: #f7f1e3; --bg-surface: #ffffff; --accent: #706fd3;
            --text-main: #1a1a2e; --text-muted: #706fd3; --border: rgba(112, 111, 211, 0.1);
        }

        /* ========================================================================
         * 5. LEGACY AEC (KCL-Inspired)
         * ======================================================================== */
        body.theme-legacy-dark {
            --bg-canvas: #222222; --bg-surface: #2d2d2d; --accent: #004488;
            --text-main: #cccccc; --text-muted: #888888; --border: rgba(255, 255, 255, 0.05);
        }
        body.theme-legacy-light {
            --bg-canvas: #f4f4f4; --bg-surface: #ffffff; --accent: #cc0000;
            --text-main: #333333; --text-muted: #666666; --border: rgba(0, 0, 0, 0.1);
        }

        /* Base Component Logic */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-canvas); color: var(--text-main);
            font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; transition: all 0.4s ease;
        }
        @media (min-width: 768px) { body { flex-direction: row; } }

        /* Canvas Grid */
        #canvas {
            flex-grow: 1; position: relative;
            background-image: 
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 50px 50px; display: flex; align-items: center; justify-content: center; order: 2;
        }
        @media (min-width: 768px) { #canvas { order: 1; } }

        /* Omni-Bar */
        #header-area {
            padding: 16px; width: 100%; z-index: 100;
            background: var(--bg-surface); border-bottom: 1px solid var(--border); order: 1;
        }
        @media (min-width: 768px) {
            #header-area {
                position: absolute; top: 40px; left: 50%; transform: translateX(-50%);
                width: 600px; background: transparent; border: none; padding: 0; pointer-events: none;
            }
        }
        #omni-bar {
            background: var(--bg-surface); backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-left: 3px solid var(--accent);
            border-radius: 4px; padding: 12px 20px; display: flex; align-items: center; gap: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2); pointer-events: auto;
        }
        #omni-bar span.prompt { color: var(--accent); font-family: 'JetBrains Mono', monospace; font-weight: 500; }
        #omni-bar input { background: transparent; border: none; color: var(--text-main); font-family: 'JetBrains Mono', monospace; font-size: 15px; width: 100%; outline: none; }

        /* Truth Inspector */
        #inspector {
            width: 100%; max-height: 38vh; background: var(--bg-surface);
            border-top: 1px solid var(--border); display: flex; flex-direction: column; z-index: 50; order: 3; overflow-y: auto;
        }
        @media (min-width: 768px) { #inspector { width: 340px; max-height: 100vh; border-top: none; border-left: 1px solid var(--border); order: 2; } }
        #inspector header { padding: 24px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg-surface); }
        #inspector h2 { font-size: 10px; text-transform: uppercase; letter-spacing: 0.15em; color: var(--text-muted); margin-bottom: 6px; }
        .model-name { font-size: 18px; font-weight: 600; color: var(--text-main); }
        .inspector-content { padding: 24px; }
        .inspector-section { margin-bottom: 28px; }
        .inspector-section h3 { font-size: 10px; color: var(--text-muted); margin-bottom: 12px; font-family: 'JetBrains Mono', monospace; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }
        .data-label { color: var(--text-muted); }
        .data-value { font-family: 'JetBrains Mono', monospace; color: var(--accent); }
        .badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(0,0,0,0.05); border: 1px solid var(--accent); color: var(--accent); padding: 4px 12px; border-radius: 2px; font-size: 10px; font-weight: 600; margin-top: 12px; text-transform: uppercase; }

        /* Equipment SVG */
        .equipment-svg { stroke: var(--text-muted); stroke-width: 1.25; fill: rgba(132, 165, 157, 0.03); width: 130px; height: 130px; transition: all 0.5s ease; }
        .equipment-svg text { stroke: none; } /* Prevents text from becoming unreadable thick lines */
        @media (min-width: 768px) { .equipment-svg { width: 200px; height: 200px; } }
        .equipment-svg:hover { stroke: var(--accent); }
        .equipment-svg:hover rect { filter: drop-shadow(0 0 8px var(--accent)); } /* Apply glow only to equipment body, not text */
        .utility-node { fill: var(--accent); stroke: var(--bg-canvas); stroke-width: 1.5; }

        /* ========================================================================
         * COLLAPSIBLE EDITORIAL SWATCH GRID
         * ======================================================================== */
        #matrix-switcher {
            position: absolute; bottom: 20px; left: 20px; z-index: 200;
            background: var(--bg-surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 0; box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 48px; height: 48px; overflow: hidden;
        }
        #matrix-switcher.expanded { width: 260px; height: auto; padding: 20px; }
        #switcher-toggle {
            width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
            background: transparent; border: none; cursor: pointer; color: var(--accent);
            position: absolute; top: 0; right: 0; transition: transform 0.3s ease;
        }
        #matrix-switcher.expanded #switcher-toggle { transform: rotate(180deg); width: 24px; height: 24px; top: 18px; right: 18px; }
        #matrix-content { opacity: 0; pointer-events: none; transition: opacity 0.2s ease; }
        #matrix-switcher.expanded #matrix-content { opacity: 1; pointer-events: auto; }
        #matrix-switcher h4 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.15em; color: var(--text-muted); margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
        .matrix-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .matrix-col-header { font-size: 10px; color: var(--text-muted); text-align: center; font-weight: 600; padding-bottom: 4px; }
        .swatch-btn {
            width: 110px; height: 54px; border-radius: 6px; border: 2px solid transparent;
            cursor: pointer; position: relative; overflow: hidden; transition: all 0.2s ease;
            display: flex; flex-direction: column; justify-content: flex-end; padding: 8px;
        }
        .swatch-btn span { font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; background: rgba(0,0,0,0.6); color: white; padding: 2px 6px; border-radius: 2px; width: fit-content; }
        .swatch-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .swatch-btn.active { border-color: var(--accent); box-shadow: 0 0 15px var(--accent); }

        /* Swatch Backgrounds */
        .btn-perf-dark { background: linear-gradient(135deg, #121212 60%, #2dffc4 100%); }
        .btn-perf-light { background: linear-gradient(135deg, #F0EEE9 60%, #990F3D 100%); }
        .btn-bal-dark { background: linear-gradient(135deg, #1b201e 60%, #e07a5f 100%); }
        .btn-bal-light { background: linear-gradient(135deg, #F0EEE9 60%, #E2725B 100%); }
        .btn-moody-dark { background: linear-gradient(135deg, #0d1b1e 60%, #d4a5a5 100%); }
        .btn-moody-light { background: linear-gradient(135deg, #F0EEE9 60%, #4A0404 100%); }
        .btn-solar-dark { background: linear-gradient(135deg, #1a1a2e 60%, #706fd3 100%); }
        .btn-solar-light { background: linear-gradient(135deg, #f7f1e3 60%, #706fd3 100%); }
        .btn-legacy-dark { background: linear-gradient(135deg, #222222 60%, #004488 100%); }
        .btn-legacy-light { background: linear-gradient(135deg, #f4f4f4 60%, #cc0000 100%); }
    </style>
</head>
<body class="theme-perf-dark">

    <div id="matrix-switcher">
        <button id="switcher-toggle" onclick="toggleMatrix()" title="Toggle Design Matrix">
            <svg id="toggle-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
            </svg>
        </button>
        
        <div id="matrix-content">
            <h4>Design Matrix</h4>
            <div class="matrix-grid">
                <div class="matrix-col-header">Dark</div>
                <div class="matrix-col-header">Light</div>
                
                <button class="swatch-btn btn-perf-dark active" onclick="setTheme('perf-dark', this)"><span>Opt-Dark</span></button>
                <button class="swatch-btn btn-perf-light" onclick="setTheme('perf-light', this)"><span>Optimism</span></button>
                
                <button class="swatch-btn btn-bal-dark" onclick="setTheme('bal-dark', this)"><span>Bot-Dark</span></button>
                <button class="swatch-btn btn-bal-light" onclick="setTheme('bal-light', this)"><span>Botanical</span></button>
                
                <button class="swatch-btn btn-moody-dark" onclick="setTheme('moody-dark', this)"><span>Luxe-Dark</span></button>
                <button class="swatch-btn btn-moody-light" onclick="setTheme('moody-light', this)"><span>Luxe</span></button>

                <button class="swatch-btn btn-solar-dark" onclick="setTheme('solar-dark', this)"><span>Quiet-D</span></button>
                <button class="swatch-btn btn-solar-light" onclick="setTheme('solar-light', this)"><span>Solar Lux</span></button>

                <button class="swatch-btn btn-legacy-dark" onclick="setTheme('legacy-dark', this)"><span>Leg-Dark</span></button>
                <button class="swatch-btn btn-legacy-light" onclick="setTheme('legacy-light', this)"><span>Legacy</span></button>
            </div>
        </div>
    </div>

    <div id="header-area">
        <div id="omni-bar">
            <span class="prompt">/</span>
            <input type="text" placeholder="Command..." value="add vulcan-range-36">
        </div>
    </div>

    <div id="canvas">
        <svg class="equipment-svg" viewBox="0 0 100 100">
            <rect x="10" y="10" width="80" height="80" rx="4" />
            <rect x="20" y="20" width="60" height="60" rx="2" stroke-dasharray="3,3" />
            <circle class="utility-node" cx="50" cy="90" r="4" />
            <circle class="utility-node" cx="10" cy="50" r="4" />
            <text x="50" y="55" font-size="10" text-anchor="middle" fill="var(--text-muted)" font-family="JetBrains Mono">PHAROS-DW-01</text>
        </svg>
    </div>

    <aside id="inspector">
        <header>
            <h2>Entity Inspector</h2>
            <div class="model-name">Vulcan-36-Gas-Range</div>
            <div class="badge">Verified Truth</div>
        </header>

        <div class="inspector-content">
            <div class="inspector-section">
                <h3>System Identification</h3>
                <div class="data-row"><span class="data-label">UUID</span><span class="data-value">pkd-772-xf</span></div>
                <div class="data-row"><span class="data-label">Origin</span><span class="data-value">Vulcan/AEC-Bridge</span></div>
            </div>
            <div class="inspector-section">
                <h3>Physical Geometry</h3>
                <div class="data-row"><span class="data-label">Footprint</span><span class="data-value">914 x 812 mm</span></div>
            </div>
        </div>
    </aside>

    <script>
        function setTheme(theme, btn) {
            document.body.className = 'theme-' + theme;
            document.querySelectorAll('.swatch-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function toggleMatrix() {
            const switcher = document.getElementById('matrix-switcher');
            switcher.classList.toggle('expanded');
            const icon = document.getElementById('toggle-icon');
            if (switcher.classList.contains('expanded')) {
                icon.innerHTML = '<path d="M18 6L6 18M6 6l12 12"/>';
            } else {
                icon.innerHTML = '<path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>';
            }
        }
    </script>

</body>
</html>
