services:
  # 1. Cloudflare Auth Bridge (Worker + Local D1)
  auth-bridge:
    image: public.ecr.aws/docker/library/node:20-slim
    container_name: pkd-auth-bridge
    security_opt:
      - seccomp=unconfined
    working_dir: /app
    volumes:
      - ../../packages/auth-bridge:/app
    ports:
      - "3001:3001"
    environment:
      - VERIFICATION_URI=http://localhost:4321/verify
      - PORT=3001
    command: >
      sh -c "npm install && npx wrangler d1 execute DB --local --command 'DROP TABLE IF EXISTS auth_codes; CREATE TABLE auth_codes (device_code TEXT PRIMARY KEY, user_code TEXT, status TEXT, sub TEXT, access_token TEXT, id_token TEXT, refresh_token TEXT, ttl INTEGER)' && npm run dev -- --ip 0.0.0.0 --port 3001"

networks:
  default:
    name: pkd-network
