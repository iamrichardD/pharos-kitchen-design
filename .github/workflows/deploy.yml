# Traceability: Issue #6, ADR 0016, ADR 0021
# ========================================================================

name: "🚀 Deploy Infrastructure"

on:
  push:
    branches:
      - main
    paths:
      - 'infra/cloud/**'
  workflow_dispatch: # Allow manual trigger for emergency or testing

permissions:
  id-token: write # Required for requesting the JWT from GitHub's OIDC provider
  contents: read  # Required for actions/checkout

jobs:
  deploy-infra:
    name: "Deploy Cloud Infrastructure"
    runs-on: ubuntu-latest
    environment: production # Requires the 'production' environment secrets/approval
    
    defaults:
      run:
        working-directory: infra/cloud

    steps:
      - name: "🛒 Checkout Code"
        uses: actions/checkout@v4

      - name: "🏗️ Setup OpenTofu"
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.9.0

      - name: "🔐 Configure AWS Credentials (OIDC)"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/pkd-prism-gh-deployer
          aws-region: ${{ secrets.AWS_REGION || 'us-west-2' }}

      - name: "🔄 Initialize OpenTofu"
        run: tofu init

      - name: "📋 Infrastructure Plan"
        run: tofu plan -out=tfplan
        env:
          TF_VAR_AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          TF_VAR_CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_GITHUB_REPO: ${{ github.repository }}

      - name: "🚀 Apply Infrastructure Changes"
        if: github.ref == 'refs/heads/main'
        run: tofu apply -auto-approve tfplan
        env:
          TF_VAR_AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          TF_VAR_CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_GITHUB_REPO: ${{ github.repository }}
