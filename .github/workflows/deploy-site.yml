# Purpose: Deploys the Astro marketing site to GitHub Pages.
# Traceability: Issue #13, ADR 0004
# ========================================================================

name: "🌐 Deploy Marketing Site"

on:
  push:
    branches:
      - main
    paths:
      - 'apps/marketing/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: "🏗️ Build Site"
    runs-on: ubuntu-latest
    steps:
      - name: "🛒 Checkout Code"
        uses: actions/checkout@v4
        
      - name: "🟢 Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: "🦀 Setup Rust and wasm-pack"
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: "🏗️ Build WASM Core"
        run: wasm-pack build packages/pkd-core --target nodejs

      - name: "📦 Install Dependencies"
        run: npm ci
        
      - name: "🧪 Run Validation"
        run: npm test --workspaces
        
      - name: "🚀 Build with Astro"
        run: npm run build
        working-directory: ./apps/marketing
        
      - name: "📤 Upload Pages Artifact"
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./apps/marketing/dist

  deploy:
    name: "🚀 Deploy to GitHub Pages"
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
      
    steps:
      - name: "🌐 Deploy"
        id: deployment
        uses: actions/deploy-pages@v4
